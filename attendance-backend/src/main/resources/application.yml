spring:
  application:
    name: attendance-management
  
  datasource:
    url: jdbc:h2:mem:attendance_db
    username: sa
    password: 
    driver-class-name: org.h2.Driver
  
  h2:
    console:
      enabled: true
  
  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.H2Dialect
        format_sql: true

  jackson:
    serialization:
      write-dates-as-timestamps: false

server:
  port: 8080
  servlet:
    context-path: /api

jwt:
  secret: MySecureJWTSecretKeyForAttendanceManagementSystemWithAtLeast64CharactersLength!
  expiration: 86400000

logging:
  level:
    root: INFO
    com.edutech.attendance: DEBUG
